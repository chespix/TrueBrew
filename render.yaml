services:
  - type: web
    name: truebrew
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.js --seed
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
